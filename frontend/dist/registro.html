<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro Directivo - Depósito</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <link rel="icon" href="faviconmin.png" type="image/x-icon" />
  <body>
    <main class="container auth-container">
      <section class="card auth-card" id="registerCard">
        <div style="max-width: 560px; margin: 0 auto;">
          <img src="http://prod.eduge.com.ar/assets/logoGobierno-D5M0tUR9.png" alt="Logo Gobierno" style="width: 300px; height: auto; display: block; margin: 0 auto 32px;">
          <h1 style="text-align: center; margin-bottom: 8px;">Registro Directivo</h1>
          <p class="subtitle" style="text-align: center; margin-bottom: 32px;">Ingrese sus datos con el CUE de su institución para acceder al sistema.</p>

          <form id="registerForm">
            <div>
              <label>Nombre</label>
              <input type="text" id="registerNombre" required placeholder="Ej: María Gómez" />
            </div>
            <div>
              <label>CUE</label>
              <input type="text" id="registerCue" required placeholder="9 dígitos" inputmode="numeric" maxlength="9" minlength="9" pattern="[0-9]{9}" />
            </div>
            <div>
              <label>Escuela</label>
              <input type="text" id="registerEscuela" placeholder="Se cargará automáticamente" readonly disabled />
              <small id="cueStatus" style="font-size: 0.75rem; color: #666; margin-top: 4px; display: block;"></small>
            </div>
            <div id="nivelContainer" style="display: none;">
              <label>Nivel Educativo</label>
              <select id="registerNivel" required>
                <option value="">Seleccione un nivel</option>
              </select>
            </div>
            <div>
              <label>Número</label>
              <input type="text" id="registerNumero" required placeholder="Ej: 3511234567" />
            </div>
            <div>
              <label>Contraseña</label>
              <input type="password" id="registerPassword" required placeholder="Mínimo 6 caracteres" />
            </div>
            <button type="submit">Registrarse</button>
            <a href="/" class="secondary auth-switch-btn auth-switch-link">Volver al inicio</a>
          </form>

          <div id="registerMsg" class="msg"></div>
        </div>
      </section>
    </main>

    <script src="js/app.js"></script>
  </body>
</html>
