<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro de institución - Depósito</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <link rel="icon" href="faviconmin.png" type="image/x-icon" />
  <body>
    <main class="container auth-container">
      <section class="card auth-card" id="registerCard">
        <div style="max-width: 560px; margin: 0 auto;">
          <img src="http://prod.eduge.com.ar/assets/logoGobierno-D5M0tUR9.png" alt="Logo Gobierno" style="width: 300px; height: auto; display: block; margin: 0 auto 32px;">
          <h1 style="text-align: center; margin-bottom: 8px;">Registro de institución</h1>
          <p class="subtitle" style="text-align: center; margin-bottom: 32px;">Complete los datos para crear el acceso del establecimiento.</p>

          <form id="registerForm">
            <div>
              <label>Nombre del directivo</label>
              <input type="text" id="registerNombre" required placeholder="Ej: María Gómez" />
            </div>
            <div>
              <label>Institución</label>
              <input type="text" id="registerInstitucion" required placeholder="Ej: Escuela Nro. 1" />
            </div>
            <div>
              <label>CUE de la Institución</label>
              <input type="text" id="registerCue" required placeholder="Solo números" />
            </div>
            <div>
              <label>Email de contacto</label>
              <input type="email" id="registerEmail" required placeholder="Ej: institucion@correo.com" />
            </div>
            <div>
              <label>Contraseña</label>
              <input type="password" id="registerPassword" required placeholder="Mínimo 6 caracteres" />
            </div>
            <button type="submit">Crear cuenta por CUE</button>
            <a href="/" class="secondary auth-switch-btn auth-switch-link">Volver al inicio</a>
          </form>

          <div id="registerMsg" class="msg"></div>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
